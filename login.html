<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CID — Criminal Investigation Division</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/login.css">
  <link rel="icon" type="image/png" href="./assets/logos/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="login-wrapper">
    <div id="alert-container" class="alert-floating"></div>

    <div class="login-card">
      <div class="login-header">
        <img src="./assets/logos/logo.png" class="login-logo" alt="Logo CID">

        <div class="login-title-row">
          <div class="login-title">CID</div>
          <div class="login-sub">Criminal Investigation Division</div>
        </div>
      </div>


      <form class="form" id="loginForm">
        <input id="username" class="input" type="text" placeholder="Usuario">
        <input id="password" class="input" type="password" placeholder="Contraseña">

        <button class="button" type="submit">
          Acceder al sistema
        </button>
      </form>

      <div class="footer">
        Sistema de Inteligencia Criminal
      </div>

      <div class="system">
        Estado del sistema: Operativo
      </div>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>

</html>
